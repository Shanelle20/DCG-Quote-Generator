<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCG Group — Quote Generator</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root{
    --navy:#0E0C36;
    --shadowberry:#401842;
    --orange:#FF5F00;
    --golden:#FFAA19;
    --bg:#eef1f5;
    --card:#ffffff;
    --panel:#FFF0E7;
    --line:#E3E8F0;
    --text:#2B3648;
    --muted:#6B7688;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:24px 16px;
    background-color:var(--bg);
    font-family:'Segoe UI', Helvetica, Arial, sans-serif;
    color:var(--text);
  }
  .wrap{
    max-width:1180px; margin:0 auto;
    display:grid; grid-template-columns:360px 1fr; gap:24px;
  }
  @media (max-width: 860px){
    .wrap{ grid-template-columns:1fr; }
  }
  .panel{
    background-color:var(--card);
    border-radius:14px; border:1px solid var(--line);
    padding:24px;
  }
  .panel h1{
    margin:0 0 4px 0; font-size:18px; color:var(--navy);
  }
  .panel .sub{
    margin:0 0 20px 0; font-size:12.5px; color:var(--muted);
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; font-weight:600;
  }
  .field input, .field textarea, .field select{
    width:100%; font-size:14px; color:var(--text);
    padding:9px 11px; border:1px solid var(--line); border-radius:8px;
    background-color:#FAFBFD;
    font-family:inherit;
  }
  .field textarea{
    resize:vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none; border-color:var(--orange); background-color:#ffffff;
  }
  .tpl-group{
    display:flex; gap:6px; margin-bottom:18px;
  }
  .tpl-option{
    flex:1;
  }
  .tpl-option input{
    position:absolute; opacity:0; width:0; height:0;
  }
  .tpl-option label{
    display:block; text-align:center; font-size:13px; font-weight:600;
    padding:9px 6px; border-radius:8px; border:1.5px solid var(--line);
    cursor:pointer; color:var(--muted); background-color:#FAFBFD;
    transition:all 0.15s ease;
  }
  .tpl-option input:checked + label{
    border-color:var(--tpl-accent, var(--orange));
    color:var(--tpl-accent, var(--orange));
    background-color:#ffffff;
  }
  .row2{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .badge{
    display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:0.5px;
    color:var(--orange); text-transform:uppercase; border:1px solid var(--orange);
    border-radius:20px; padding:3px 10px; margin-bottom:16px;
  }
  button{
    width:100%; font-size:14px; font-weight:700; border:none; border-radius:8px;
    padding:13px 20px; cursor:pointer; font-family:inherit; margin-top:6px;
  }
  #copyBtn{
    background-color:var(--orange); color:#ffffff;
  }
  #copyBtn:hover{ opacity:0.92; }
  #downloadBtn{
    background-color:var(--panel); color:var(--navy); border:1px solid var(--orange);
  }
  #downloadBtn:hover{ background-color:#FFE5D6; }
  #insertBtn{
    background-color:var(--navy); color:#ffffff; display:none;
  }
  #insertBtn:hover{ opacity:0.92; }
  #hubspotBtn{
    background-color:#FFAA19; color:var(--navy);
  }
  #hubspotBtn:hover{ opacity:0.92; }
  .status{
    margin-top:10px; font-size:12.5px; color:var(--muted); text-align:center; min-height:16px;
  }
  .preview-panel{
    padding:0; overflow:hidden; display:flex; flex-direction:column;
  }
  .preview-header{
    padding:14px 20px; border-bottom:1px solid var(--line);
    font-size:12.5px; color:var(--muted); font-weight:600;
  }
  iframe{
    width:100%; height:1700px; border:none; background-color:var(--bg);
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="panel">
    <span class="badge">Quote generator</span>
    <h1>Generate a pricing quote</h1>
    <p class="sub">Pick a template, fill in the details — the email on the right updates live. Copy or download the finished HTML when you're ready to send.</p>

    <div class="field">
      <label>Template</label>
      <div class="tpl-group">
        <div class="tpl-option">
          <input type="radio" name="tpl" id="tpl-foxit" value="foxit" checked onchange="onTemplateChange()">
          <label for="tpl-foxit">Foxit</label>
        </div>
        <div class="tpl-option">
          <input type="radio" name="tpl" id="tpl-anydesk" value="anydesk" onchange="onTemplateChange()">
          <label for="tpl-anydesk">AnyDesk</label>
        </div>
        <div class="tpl-option">
          <input type="radio" name="tpl" id="tpl-teamviewer" value="teamviewer" onchange="onTemplateChange()">
          <label for="tpl-teamviewer">TeamViewer</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="industrySelect">Customer industry (optional)</label>
      <select id="industrySelect" onchange="onIndustryChange()">
        <option value="">— None —</option>
        <option value="construction">Construction</option>
        <option value="legal">Legal</option>
        <option value="healthcare">Healthcare</option>
        <option value="finance">Finance</option>
        <option value="manufacturing">Manufacturing</option>
        <option value="retail">Retail</option>
        <option value="education">Education</option>
        <option value="government">Government</option>
        <option value="it">IT / Technology</option>
        <option value="custom">Other (type your own)</option>
      </select>
    </div>

    <div class="field" id="customIndustryField" style="display:none;">
      <label for="customIndustryName">Type the industry name</label>
      <input type="text" id="customIndustryName" placeholder="e.g. Hospitality" oninput="render()">
    </div>

    <div class="field">
      <label for="customerCompany">Customer / company name (optional)</label>
      <input type="text" id="customerCompany" placeholder="e.g. Acme Construction" oninput="render()">
    </div>

    <div class="field">
      <label for="customIndustryNote">Custom personalization note (optional — overrides the industry preset above)</label>
      <textarea id="customIndustryNote" rows="3" placeholder="Type a specific line about this customer's situation and it'll be used instead of the preset" oninput="render()"></textarea>
    </div>

    <div class="field">
      <label for="contactName">Contact name</label>
      <input type="text" id="contactName" value="John" oninput="render()">
    </div>

    <div class="field" id="licenseNameTextField">
      <label for="licenseNameText">License name</label>
      <input type="text" id="licenseNameText" value="Foxit PDF Editor+ — Business" oninput="render()">
    </div>

    <div class="field" id="licenseNameSelectField" style="display:none;">
      <label for="licenseNameSelect">License name (tier)</label>
      <select id="licenseNameSelect" onchange="render()"></select>
    </div>

    <div class="field">
      <label for="unitPrice">Unit price (ex VAT)</label>
      <input type="text" id="unitPrice" value="124.00" oninput="onPricingChange()">
    </div>

    <div class="row2">
      <div class="field">
        <label for="qty">Qty (user licenses)</label>
        <input type="text" id="qty" value="10" oninput="onPricingChange()">
      </div>
      <div class="field">
        <label for="totalPrice">Total price (auto)</label>
        <input type="text" id="totalPrice" value="1,240.00" readonly style="background-color:#F0F2F5; color:var(--muted); cursor:not-allowed;">
      </div>
    </div>

    <div class="field" id="addonToggleField" style="display:none;">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:600;">
        <input type="checkbox" id="addonEnabled" onchange="onAddonToggle()" style="width:auto;">
        Add-on: AnyDesk Addon Channel
      </label>
    </div>

    <div id="addonFields" style="display:none;">
      <div class="field">
        <label for="addonUnitPrice">Add-on unit price (ex VAT)</label>
        <input type="text" id="addonUnitPrice" value="0.00" oninput="onAddonPricingChange()">
      </div>
      <div class="row2">
        <div class="field">
          <label for="addonQty">Add-on qty</label>
          <input type="text" id="addonQty" value="1" oninput="onAddonPricingChange()">
        </div>
        <div class="field">
          <label for="addonTotalPrice">Add-on total (auto)</label>
          <input type="text" id="addonTotalPrice" value="0.00" readonly style="background-color:#F0F2F5; color:var(--muted); cursor:not-allowed;">
        </div>
      </div>
    </div>

    <div class="field" id="tvAddonToggleField" style="display:none;">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:600;">
        <input type="checkbox" id="tvAddonEnabled" onchange="onTvAddonToggle()" style="width:auto;">
        Add-on: TeamViewer Addon Channel
      </label>
    </div>

    <div id="tvAddonFields" style="display:none;">
      <div class="field">
        <label for="tvAddonUnitPrice">Add-on unit price (ex VAT)</label>
        <input type="text" id="tvAddonUnitPrice" value="0.00" oninput="onTvAddonPricingChange()">
      </div>
      <div class="row2">
        <div class="field">
          <label for="tvAddonQty">Add-on qty</label>
          <input type="text" id="tvAddonQty" value="1" oninput="onTvAddonPricingChange()">
        </div>
        <div class="field">
          <label for="tvAddonTotalPrice">Add-on total (auto)</label>
          <input type="text" id="tvAddonTotalPrice" value="0.00" readonly style="background-color:#F0F2F5; color:var(--muted); cursor:not-allowed;">
        </div>
      </div>
    </div>

    <button id="copyBtn" type="button" onclick="copyHtml()">Copy email HTML</button>
    <button id="downloadBtn" type="button" onclick="downloadHtml()">Download .html file</button>
    <button id="insertBtn" type="button" onclick="insertIntoReply()">Insert into reply</button>
    <button id="hubspotBtn" type="button" onclick="logToHubSpot()">Log to HubSpot</button>
    <p class="status" id="status"></p>
  </div>

  <div class="panel preview-panel">
    <div class="preview-header">Live preview</div>
    <iframe id="previewFrame"></iframe>
  </div>

</div>

const INDUSTRIES = {
  construction: {
    label: 'Construction',
    intro: (company) => `I know teams${company ? ` at ${company}` : ''} managing multiple sites, subcontractors and crews need tools that are simple to roll out and stay reliable even with patchy on-site connectivity — that's exactly where this fits in.`,
    callout: (product, company) => `With crews spread across sites and subcontractors coming and going, ${product} keeps approvals, remote support and reporting simple for ${company || 'construction teams'} — no matter where the job is.`
  },
  legal: {
    label: 'Legal',
    intro: (company) => `I know firms${company ? ` like ${company}` : ''} handle sensitive client documents daily, so security, audit trails and ease of use matter just as much as price.`,
    callout: (product, company) => `${product} is built to keep document handling secure and simple for ${company || 'legal teams'} — without slowing down billable work.`
  },

    label: 'Healthcare',

  },

    label: 'Retail',
    intro: (company) => `I know teams${company ? ` at ${company}` : ''} are managing multiple stores or locations, so ease of rollout and support across sites matters a lot.`,
    callout: (product, company) => `${product} makes it easy for ${company || 'retail teams'} to support and manage systems across multiple locations from one place.`
  },
  education: {
    label: 'Education',
    intro: (company) => `I know teams${company ? ` at ${company}` : ''} are working with tight budgets and a wide mix of devices and users, so simplicity and value both matter.`,
    callout: (product, company) => `${product} gives ${company || 'education teams'} an easy, budget-friendly way to support a wide range of devices and users.`
  },
  government: {

    callout: (product, company) => `${product} is a straightforward fit for ${company || 'government teams'} looking for a reliable, well-supported solution.`
  },
  it: {
    label: 'IT / Technology',
    intro: (company) => `I know teams${company ? ` at ${company}` : ''} are supporting a wide range of systems and users, so reliability and ease of management are key.`,
    callout: (product, company) => `${product} slots straight into ${company || 'IT teams'}' existing workflows, without adding extra overhead to manage.`

};

function onIndustryChange(){
  const key = document.getElementById('industrySelect').value;
  document.getElementById('customIndustryField').style.display = (key === 'custom') ? 'block' : 'none';
  render();
}

function getPersonalization(tpl){
  const industryKey = document.getElementById('industrySelect').value;
  const company = esc(document.getElementById('customerCompany').value.trim());
  const customNote = document.getElementById('customIndustryNote').value.trim();

  if(customNote){
    return {
      enabled: true,
      heading: 'Why this matters for ' + (company || 'you'),
      intro: esc(customNote),
      callout: esc(customNote)
    };
  }

  if(industryKey === 'custom'){
    const industryName = document.getElementById('customIndustryName').value.trim();
    if(!industryName) return { enabled: false };
    const industryEsc = esc(industryName);
    return {
      enabled: true,
      heading: 'Why this matters for ' + (company || industryEsc + ' teams'),
      intro: `I know teams in ${industryEsc}${company ? ` like ${company}` : ''} have their own priorities, so I've kept this quote focused on what's actually useful for you.`,
      callout: `${tpl.productName} is a flexible fit for ${company || industryEsc + ' teams'}, whatever your priorities look like day to day.`
    };
  }

  if(industryKey && INDUSTRIES[industryKey]){
    const ind = INDUSTRIES[industryKey];
    return {
      enabled: true,
      heading: 'Why this matters for ' + (company || ind.label + ' teams'),
      intro: ind.intro(company),
      callout: ind.callout(tpl.productName, company)
    };
  }

  return { enabled: false };
}

function esc(s){
  return String(s).replace(/[&<>]/g, function(c){
    return c === '&' ? '&amp;' : c === '<' ? '&lt;' : '&gt;';
  });
}

function parseNumber(str){
  const n = parseFloat(String(str).replace(/,/g, '').trim());
  return isNaN(n) ? 0 : n;
}

function formatMoney(n){
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

let lastHtml = '';

function getSelectedTemplateKey(){
  const checked = document.querySelector('input[name="tpl"]:checked');
  return checked ? checked.value : 'foxit';
}

const LICENSE_TIERS = {
  foxit: ['Foxit PDF Editor', 'Foxit PDF Editor+'],
  anydesk: ['Solo', 'Standard', 'Advanced', 'Ultimate'],
  teamviewer: ['Premium', 'Business', 'Corporate', 'Tensor']
};

function getLicenseName(tplKey){
  if(LICENSE_TIERS[tplKey]){
    const tier = document.getElementById('licenseNameSelect').value;
    if(tplKey === 'foxit') return tier;
    const vendorLabel = tplKey === 'anydesk' ? 'AnyDesk' : 'TeamViewer';
    return `${vendorLabel} — ${tier}`;
  }
  return document.getElementById('licenseNameText').value || '[License Name]';
}

function render(){
  const tplKey = getSelectedTemplateKey();
  const tpl = TEMPLATES[tplKey];
  document.documentElement.style.setProperty('--tpl-accent', tpl.accent);

  document.getElementById('addonToggleField').style.display = (tplKey === 'anydesk') ? 'block' : 'none';
  document.getElementById('tvAddonToggleField').style.display = (tplKey === 'teamviewer') ? 'block' : 'none';

  const addonActive = document.getElementById('addonEnabled').checked && tplKey === 'anydesk';
  const tvAddonActive = document.getElementById('tvAddonEnabled').checked && tplKey === 'teamviewer';

  document.getElementById('addonFields').style.display = addonActive ? 'block' : 'none';
  document.getElementById('tvAddonFields').style.display = tvAddonActive ? 'block' : 'none';

  const licenseTotal = parseNumber(document.getElementById('totalPrice').value);
  const addonTotal = parseNumber(document.getElementById('addonTotalPrice').value);
  const tvAddonTotal = parseNumber(document.getElementById('tvAddonTotalPrice').value);
  const grandTotal = licenseTotal + (addonActive ? addonTotal : 0) + (tvAddonActive ? tvAddonTotal : 0);

  const data = {
    contactName: esc(document.getElementById('contactName').value || '[Contact Name]'),
    licenseName: esc(getLicenseName(tplKey)),
    totalPrice: esc(formatMoney(grandTotal)),
    qty: esc(document.getElementById('qty').value || '[Qty]'),
    unitPrice: esc(document.getElementById('unitPrice').value || '[Unit Price]'),
    addonActive: addonActive,
    addonQty: esc(document.getElementById('addonQty').value || '0'),
    addonUnitPrice: esc(document.getElementById('addonUnitPrice').value || '0.00'),
    addonTotalPrice: esc(document.getElementById('addonTotalPrice').value || '0.00'),
    tvAddonActive: tvAddonActive,
    tvAddonQty: esc(document.getElementById('tvAddonQty').value || '0'),
    tvAddonUnitPrice: esc(document.getElementById('tvAddonUnitPrice').value || '0.00'),
    tvAddonTotalPrice: esc(document.getElementById('tvAddonTotalPrice').value || '0.00')
  };
  const pers = getPersonalization(tpl);
  lastHtml = buildTemplate(tpl, data, pers);
  document.getElementById('previewFrame').srcdoc = lastHtml;
}

function onTemplateChange(){
  const tplKey = getSelectedTemplateKey();
  const tiers = LICENSE_TIERS[tplKey];
  const textField = document.getElementById('licenseNameTextField');
  const selectField = document.getElementById('licenseNameSelectField');

  if(tiers){
    const select = document.getElementById('licenseNameSelect');
    select.innerHTML = tiers.map(t => `<option value="${t}">${t}</option>`).join('');
    textField.style.display = 'none';
    selectField.style.display = 'block';
  } else {
    document.getElementById('licenseNameText').value = TEMPLATES[tplKey].licenseNameDefault;
    textField.style.display = 'block';
    selectField.style.display = 'none';
  }

  render();
}

async function copyHtml(){
  const status = document.getElementById('status');
  try{
    await navigator.clipboard.writeText(lastHtml);
    status.textContent = "HTML copied — paste into your email client's HTML source view.";
  }catch(err){
    status.textContent = 'Could not copy automatically — select and copy from the preview instead.';
  }
}

function downloadHtml(){
  const blob = new Blob([lastHtml], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const tplKey = getSelectedTemplateKey();
  const contactSlug = (document.getElementById('contactName').value || 'quote').trim().replace(/\s+/g, '_');
  a.href = url;
  a.download = 'DCG_' + TEMPLATES[tplKey].productName + '_Quote_' + contactSlug + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('status').textContent = 'Downloaded — attach this file or open it and copy the content into your email.';
}

const HUBSPOT_FLOW_URL = 'https://defaultda3caad5ceb349cfa2ff35d912c28b.9e.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/29/workflows/8d815e65a33442839ca17b7ba773911a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=h9PDgKFltuWb_5Kd3n_cyG7q5qTUqj3hMlZ2JQnJ0Mw';

function logToHubSpot(){
  const status = document.getElementById('status');

  if(!HUBSPOT_FLOW_URL){
    status.textContent = 'HubSpot logging is not configured yet — ask IT for the flow URL.';
    return;
  }

  const tplKey = getSelectedTemplateKey();
  const payload = {
    company: document.getElementById('customerCompany').value.trim(),
    contactName: document.getElementById('contactName').value.trim(),
    product: TEMPLATES[tplKey].productName,
    licenseName: getLicenseName(tplKey),
    quantity: document.getElementById('qty').value,
    unitPrice: document.getElementById('unitPrice').value,
    totalPrice: document.getElementById('totalPrice').value,
    industry: document.getElementById('industrySelect').value,
    quoteHtml: lastHtml
  };

  status.textContent = 'Sending to HubSpot…';

  fetch(HUBSPOT_FLOW_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function(res){
    if(res.ok){
      status.textContent = 'Logged to HubSpot.';
    } else {
      status.textContent = 'HubSpot logging failed — check the flow.';
    }
  })
  .catch(function(){
    status.textContent = 'Could not reach the HubSpot flow — check your connection.';
  });
}

  const status = document.getElementById('status');
  if(typeof Office === 'undefined' || !Office.context || !Office.context.mailbox){

    return;
  }
  Office.context.mailbox.item.body.setSelectedDataAsync(
    lastHtml,
    { coercionType: Office.CoercionType.Html },
    function(result){
      status.textContent = (result.status === Office.AsyncResultStatus.Succeeded)
        ? 'Quote inserted into your reply.'
        : 'Could not insert automatically — use Copy email HTML instead.';
    }
  );
}
